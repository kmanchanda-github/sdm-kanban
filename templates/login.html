<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SDM Kanban</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .login-logo .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }
        .login-logo .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
        }
        .login-logo .logo-sub {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .login-tagline {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .login-card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 1.5rem 0;
            color: var(--text-secondary);
        }
        .error-box {
            background: rgba(233,69,96,0.12);
            border: 1px solid rgba(233,69,96,0.4);
            color: #e94560;
            border-radius: 6px;
            padding: 0.65rem 0.9rem;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }
        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .login-footer strong {
            color: var(--text-primary);
        }
        .btn-login {
            width: 100%;
            padding: 0.65rem;
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">K</div>
            <div>
                <div class="logo-text">SDM Kanban</div>
                <div class="logo-sub">Escalation Team Board</div>
            </div>
        </div>
        <div class="login-tagline">⚡ Escalation Radar</div>

        <h2>Sign in with your Cisco CEC credentials</h2>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
            <div class="form-group">
                <label for="cec_id">CEC-ID</label>
                <input type="text" id="cec_id" name="cec_id" class="form-input"
                       placeholder="e.g. kamancha" autocomplete="username"
                       value="{{ request.form.get('cec_id', '') }}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="Your Cisco password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Sign In</button>
        </form>

        <div class="login-footer">
            Access restricted to authorized team members.<br>
            Contact <strong>kamancha</strong> to request access.
        </div>
    </div>
</div>
</body>
</html>
