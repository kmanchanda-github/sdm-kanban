version: '2'

services:
  sdm-kanban:
    build: .
    container_name: sdm-kanban
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - PORT=9999
      - DATA_DIR=/app/data
    volumes:
      - kanban-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kanban-data:
