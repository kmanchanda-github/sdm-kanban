services:
  sdm-kanban:
    build: .
    container_name: sdm-kanban
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - PORT=9999
      - DATA_DIR=/app/data
    volumes:
      - kanban-data:/app/data
    networks:
      - kanban-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kanban-data:
    name: sdm-kanban-data

networks:
  kanban-network:
    name: sdm-kanban-network
    driver: bridge
